<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreatLens</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    a.button {
      padding: 12px 24px;
      background: #22c55e;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      margin: 10px;
      display: inline-block;
    }

    a.secondary {
      background: transparent;
      border: 1px solid #94a3b8;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <h1>ThreatLens</h1>
  <p>AI-powered browser security that detects phishing, scams, and unsafe websites in real-time.</p>

  <div>
    <a href="/privacy/" class="button secondary">Privacy Policy</a>
  </div>

</html>
